<!-- GOOGLE ADS                                   -->
<!-- Replace YOUR_GOOGLE_ADS_ID from .env         -->

<script async src="https://www.googletagmanager.com/gtag/js?id=YOUR_GOOGLE_ADS_ID"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'YOUR_GOOGLE_ADS_ID');
</script>

<!-- ============================================ -->
<!-- UTM CAPTURE — stores UTMs to pass to GHL     -->
<!-- ============================================ -->
<script>
  (function() {
    const params = new URLSearchParams(window.location.search);
    const utms = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'];
    utms.forEach(function(key) {
      const val = params.get(key);
      if (val) sessionStorage.setItem(key, val);
    });
  })();

  // Call this on form submit to fire conversion events
  function fireConversion(eventName) {
    // PostHog
    if (window.posthog) posthog.capture(eventName);

    // Meta Pixel
    if (window.fbq) fbq('track', 'Lead');

    // Google Ads — replace with your conversion label
    if (window.gtag) gtag('event', 'conversion', {
      'send_to': 'YOUR_GOOGLE_ADS_ID/YOUR_CONVERSION_LABEL'
    });
  }
</script>
